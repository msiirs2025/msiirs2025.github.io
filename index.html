<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/L.Control.Locate.min.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <link rel="stylesheet" href="css/leaflet-measure.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/L.Control.Locate.min.js"></script>
        <script src="js/multi-style-layer.js"></script>
        <script src="js/leaflet-svg-shape-markers.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="js/proj4.js"></script>
        <script src="js/proj4leaflet.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/SnowGIS_SHPPumpsshp_3.js"></script>
        <script src="data/SnowGIS_SHPCholera_Deathsshp_4.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString' || e.target.feature.geometry.type === 'MultiLineString') {
              highlightLayer.setStyle({
                color: 'rgba(255, 255, 0, 1.00)',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: 'rgba(255, 255, 0, 1.00)',
                fillOpacity: 1
              });
            }
            highlightLayer.openPopup();
        }
        var crs = new L.Proj.CRS('EPSG:27700', '+proj=tmerc +lat_0=49 +lon_0=-2 +k=0.9996012717 +x_0=400000 +y_0=-100000 +ellps=airy +units=m +no_defs', {
            resolutions: [2800, 1400, 700, 350, 175, 84, 42, 21, 11.2, 5.6, 2.8, 1.4, 0.7, 0.35, 0.14, 0.07],
        });
        var map = L.map('map', {
            crs: crs,
            continuousWorld: false,
            worldCopyJump: false, 
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[51.5079635176061,-0.14544697517459856],[51.51674565672974,-0.12601605092662685]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
            map.setMaxBounds(map.getBounds());
            map.setMinZoom(map.getZoom());
        }
        map.createPane('pane_SnowGIS_SHPSnowMaptif_0');
        map.getPane('pane_SnowGIS_SHPSnowMaptif_0').style.zIndex = 400;
        var img_SnowGIS_SHPSnowMaptif_0 = 'data/SnowGIS_SHPSnowMaptif_0.png';
        var img_bounds_SnowGIS_SHPSnowMaptif_0 = [[51.50884462144197,-0.14446887547005957],[51.517139432250346,-0.130301364728386]];
        var layer_SnowGIS_SHPSnowMaptif_0 = new L.imageOverlay(img_SnowGIS_SHPSnowMaptif_0,
                                              img_bounds_SnowGIS_SHPSnowMaptif_0,
                                              {pane: 'pane_SnowGIS_SHPSnowMaptif_0'});
        bounds_group.addLayer(layer_SnowGIS_SHPSnowMaptif_0);
        map.addLayer(layer_SnowGIS_SHPSnowMaptif_0);
        map.createPane('pane_SnowGIS_SHPOSMaptif_1');
        map.getPane('pane_SnowGIS_SHPOSMaptif_1').style.zIndex = 401;
        var img_SnowGIS_SHPOSMaptif_1 = 'data/SnowGIS_SHPOSMaptif_1.png';
        var img_bounds_SnowGIS_SHPOSMaptif_1 = [[51.50819519490675,-0.14594289532601637],[51.51792575733842,-0.12871973041691398]];
        var layer_SnowGIS_SHPOSMaptif_1 = new L.imageOverlay(img_SnowGIS_SHPOSMaptif_1,
                                              img_bounds_SnowGIS_SHPOSMaptif_1,
                                              {pane: 'pane_SnowGIS_SHPOSMaptif_1'});
        bounds_group.addLayer(layer_SnowGIS_SHPOSMaptif_1);
        map.addLayer(layer_SnowGIS_SHPOSMaptif_1);
        map.createPane('pane_SnowGIS_SHPOSMap_Grayscaletif_2');
        map.getPane('pane_SnowGIS_SHPOSMap_Grayscaletif_2').style.zIndex = 402;
        var img_SnowGIS_SHPOSMap_Grayscaletif_2 = 'data/SnowGIS_SHPOSMap_Grayscaletif_2.png';
        var img_bounds_SnowGIS_SHPOSMap_Grayscaletif_2 = [[51.50819519490707,-0.14594289532600327],[51.51792575733842,-0.12871973041691398]];
        var layer_SnowGIS_SHPOSMap_Grayscaletif_2 = new L.imageOverlay(img_SnowGIS_SHPOSMap_Grayscaletif_2,
                                              img_bounds_SnowGIS_SHPOSMap_Grayscaletif_2,
                                              {pane: 'pane_SnowGIS_SHPOSMap_Grayscaletif_2'});
        bounds_group.addLayer(layer_SnowGIS_SHPOSMap_Grayscaletif_2);
        map.addLayer(layer_SnowGIS_SHPOSMap_Grayscaletif_2);
        function pop_SnowGIS_SHPPumpsshp_3(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2"><strong>Id</strong><br />' + (feature.properties['Id'] !== null ? autolinker.link(String(feature.properties['Id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_SnowGIS_SHPPumpsshp_3_0() {
            return {
                pane: 'pane_SnowGIS_SHPPumpsshp_3',
                radius: 10.4,
                opacity: 1,
                color: 'rgba(227,26,28,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 2.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,255,255,1.0)',
                interactive: true,
            }
        }
        function style_SnowGIS_SHPPumpsshp_3_1() {
            return {
                pane: 'pane_SnowGIS_SHPPumpsshp_3',
                radius: 6.0,
                opacity: 1,
                color: 'rgba(227,26,28,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(227,26,28,1.0)',
                interactive: true,
            }
        }map.createPane('pane_SnowGIS_SHPPumpsshp_3');
        map.getPane('pane_SnowGIS_SHPPumpsshp_3').style.zIndex = 403;
        map.getPane('pane_SnowGIS_SHPPumpsshp_3').style['mix-blend-mode'] = 'normal';

        /* ✅ CUSTOM JPG ICON */
        var pumpIcon = L.icon({
            iconUrl: 'data/images.png',   // 🔴 change path if needed
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });

        var layer_SnowGIS_SHPPumpsshp_3 = new L.geoJson(json_SnowGIS_SHPPumpsshp_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_SnowGIS_SHPPumpsshp_3',
            layerName: 'layer_SnowGIS_SHPPumpsshp_3',
            pane: 'pane_SnowGIS_SHPPumpsshp_3',
            onEachFeature: pop_SnowGIS_SHPPumpsshp_3,

            /* ✅ REPLACED HERE */
            pointToLayer: function (feature, latlng) {
                return L.marker(latlng, { icon: pumpIcon });
            }
        });

        bounds_group.addLayer(layer_SnowGIS_SHPPumpsshp_3);
        map.addLayer(layer_SnowGIS_SHPPumpsshp_3);
        function pop_SnowGIS_SHPCholera_Deathsshp_4(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td class="visible-with-data" id="Id" colspan="2"><strong>Id</strong><br />' + (feature.properties['Id'] !== null ? autolinker.link(String(feature.properties['Id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Count</th>\
                        <td class="visible-with-data" id="Count">' + (feature.properties['Count'] !== null ? autolinker.link(String(feature.properties['Count']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_SnowGIS_SHPCholera_Deathsshp_4_0() {
            return {
                pane: 'pane_SnowGIS_SHPCholera_Deathsshp_4',
                radius: 8.0,
                opacity: 1,
                color: 'rgba(255,255,255,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 2.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(0,0,0,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_SnowGIS_SHPCholera_Deathsshp_4');
        map.getPane('pane_SnowGIS_SHPCholera_Deathsshp_4').style.zIndex = 404;
        map.getPane('pane_SnowGIS_SHPCholera_Deathsshp_4').style['mix-blend-mode'] = 'normal';
        /* ✅ CUSTOM ICON FOR DEATHS */
        var deathIcon = L.icon({
            iconUrl: 'data/death.png',
            iconSize: [28, 28],
            iconAnchor: [14, 28],
            popupAnchor: [0, -28]
        });

        var layer_SnowGIS_SHPCholera_Deathsshp_4 = new L.geoJson(json_SnowGIS_SHPCholera_Deathsshp_4, {
            attribution: '',
            interactive: true,
            dataVar: 'json_SnowGIS_SHPCholera_Deathsshp_4',
            layerName: 'layer_SnowGIS_SHPCholera_Deathsshp_4',
            pane: 'pane_SnowGIS_SHPCholera_Deathsshp_4',
            onEachFeature: pop_SnowGIS_SHPCholera_Deathsshp_4,

            /* ✅ REPLACED HERE */
            pointToLayer: function (feature, latlng) {
                return L.marker(latlng, { icon: deathIcon });
            }
        });
        bounds_group.addLayer(layer_SnowGIS_SHPCholera_Deathsshp_4);
        map.addLayer(layer_SnowGIS_SHPCholera_Deathsshp_4);
        var overlaysTree = [
            {label: '<img src="data/death.png" width=24 height=24/> Cholera_Deaths.shp', layer: layer_SnowGIS_SHPCholera_Deathsshp_4},
            {label: '<img src="data/images.png" width=24 height=24/> Pumps.shp', layer: layer_SnowGIS_SHPPumpsshp_3},
            {label: "SnowGIS_SHP/OSMap_Grayscale.tif", layer: layer_SnowGIS_SHPOSMap_Grayscaletif_2},
            {label: "SnowGIS_SHP/OSMap.tif", layer: layer_SnowGIS_SHPOSMaptif_1},
            {label: "SnowGIS_SHP/SnowMap.tif", layer: layer_SnowGIS_SHPSnowMaptif_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        map.addControl(new L.Control.Search({
            layer: layer_SnowGIS_SHPCholera_Deathsshp_4,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'Count'}));
        if (typeof url === 'undefined') {
            document.getElementsByClassName('search-button')[0].className += ' fa fa-binoculars';
        } else {
            document.getElementsByClassName('search-button')[1].className += ' fa fa-binoculars';
        }
        L.ImageOverlay.include({
            getBounds: function () {
                return this._bounds;
            }
        });
        </script>        
    </body>
</html>
